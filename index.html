<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кондитерская</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header__logo">
      <img src="images/logo.jpg" alt="Pink Cake" class="header__logo-img">
    </div>
    <nav class="header__nav">
      <a href="#" class="header__link">Каталог</a>
      <a href="#" class="header__link">Контакты</a>
      <div class="header__cart">
        <button class="cart__btn">
          <img src="images/cart-icon.svg" alt="Корзина" class="cart__icon">
          <span class="cart__count">0</span>
        </button>
      </div>
    </nav>
  </header>
  
  <section class="catalog">
    <div class="container catalog__container">
      <h2 class="catalog__title">Каталог</h2>

      <div class="catalog__tabs">
        <button class="catalog__tab catalog__tab--active">Все товары</button>
        <button class="catalog__tab">Инвентарь</button>
        <button class="catalog__tab">Ингредиенты</button>
        <button class="catalog__tab">Декор</button>
        <button class="catalog__tab">Упаковка</button>
      </div>

      <div class="catalog__grid">
        <!-- Карточка товара 1 -->
        <div class="catalog__card" data-id="1" data-name="Кондитерский мешок" data-price="250">
          <div class="catalog__card-img"></div>
          <h3 class="catalog__card-title">Кондитерский мешок</h3>
          <p class="catalog__card-desc">Многоразовый, 30 см</p>
          <button class="catalog__card-btn">
            <img src="images/cart-icon-small.svg" alt="В корзину" class="cart-icon">
          </button>
        </div>

        <!-- Карточка товара 2 -->
        <div class="catalog__card" data-id="2" data-name="Насадки для крема" data-price="450">
          <div class="catalog__card-img"></div>
          <h3 class="catalog__card-title">Насадки для крема</h3>
          <p class="catalog__card-desc">Набор 12 штук</p>
          <button class="catalog__card-btn">
            <img src="images/cart-icon-small.svg" alt="В корзину" class="cart-icon">
          </button>
        </div>

        <!-- Карточка товара 3 -->
        <div class="catalog__card" data-id="3" data-name="Красители гелевые" data-price="350">
          <div class="catalog__card-img"></div>
          <h3 class="catalog__card-title">Красители гелевые</h3>
          <p class="catalog__card-desc">Набор 6 цветов</p>
          <button class="catalog__card-btn">
            <img src="images/cart-icon-small.svg" alt="В корзину" class="cart-icon">
          </button>
        </div>

        <!-- Карточка товара 4 -->
        <div class="catalog__card" data-id="4" data-name="Ванильный экстракт" data-price="180">
          <div class="catalog__card-img"></div>
          <h3 class="catalog__card-title">Ванильный экстракт</h3>
          <p class="catalog__card-desc">100 мл</p>
          <button class="catalog__card-btn">
            <img src="images/cart-icon-small.svg" alt="В корзину" class="cart-icon">
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Попап корзины -->
  <div class="cart-popup">
    <div class="cart-popup__overlay"></div>
    <div class="cart-popup__content">
      <div class="cart-popup__header">
        <h3 class="cart-popup__title">Корзина</h3>
        <button class="cart-popup__close">×</button>
      </div>
      <div class="cart-popup__items">
        <p class="cart-popup__empty">Корзина пуста</p>
      </div>
      <div class="cart-popup__footer">
        <div class="cart-popup__total">
          <span>Итого:</span>
          <span class="cart-popup__total-sum">0 ₽</span>
        </div>
        <button class="cart-popup__checkout">Оформить заказ</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно оформления заказа -->
  <div class="order-modal">
    <div class="order-modal__overlay"></div>
    <div class="order-modal__content">
      <h3 class="order-modal__title">Оформление заказа</h3>
      <form id="orderForm">
        <div class="order-modal__form-group">
          <label for="name">Имя *</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="order-modal__form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="order-modal__form-group">
          <label for="address">Адрес доставки *</label>
          <textarea id="address" name="address" required></textarea>
        </div>
        <div class="order-modal__actions">
          <button type="button" class="order-modal__btn order-modal__btn--cancel" id="cancelOrderBtn">Отмена</button>
          <button type="submit" class="order-modal__btn order-modal__btn--submit">Заказать</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Уведомление -->
  <div class="notification" id="notification"></div>

  <script src="js/script.js"></script>
</body>
</html>
